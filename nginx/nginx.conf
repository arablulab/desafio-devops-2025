worker_processes auto;

events {
    worker_connections 1024;
}

http {
    proxy_cache_path /var/cache/nginx/devops_cache levels=1:2 keys_zone=devops_cache:10m max_size=100m inactive=10m use_temp_path=off;

    upstream app_node {
        server app-node:3000;
    }

    upstream app_python {
        server app-python:8000;
    }

    server {
        listen 8080;
        server_name _;

        add_header X-Proxy "nginx" always;

        location = / {
            default_type application/json;
            return 200 '{"status":"ok","mensagem":"Use /app1/texto, /app1/hora, /app2/texto ou /app2/hora"}';
        }

        location /app1/ {
            rewrite ^/app1/(.*)$ /$1 break;
            proxy_pass http://app_node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_cache devops_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 10s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /app2/ {
            rewrite ^/app2/(.*)$ /$1 break;
            proxy_pass http://app_python;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_cache devops_cache;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 60s;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status always;
        }

        location /nginx-health {
            access_log off;
            default_type application/json;
            return 200 '{"status":"ok","app":"nginx"}';
        }
    }
}
